<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas Mundial</title>
    <link rel="icon" type="image/png" href="https://abs.twimg.com/emoji/v2/72x72/1f5fa.png">
    <link rel="stylesheet" href="MapaMundo.css">
</head>
<body>
<nav>
        <div class="logo-contenedor">
            <img src="https://abs.twimg.com/emoji/v2/72x72/1f5fa.png" alt="Logo Atlas" class="logo-menu">
        </div>
        
        <ul class="menu-principal">
            <li class="dropdown">
                <a href="#" class="dropbtn" id="nav-btn-paises" onclick="mostrarAtlas()">🌍 Países ▼</a>
                <div class="dropdown-content" id="menu-paises">
                    </div>
            </li>
            
            <li class="dropdown">
                <a href="#" class="dropbtn" id="nav-btn-juegos">🎮 Juegos ▼</a>
                <div class="dropdown-content">
                    <a href="#" onclick="mostrarJuego('contrarreloj')" id="nav-btn-contra">⏱️ Contrarreloj</a>
                    <a href="#" onclick="mostrarJuego('muertesubita')" id="nav-btn-muerte">💀 Muerte Súbita</a>
                    <a href="#" onclick="mostrarJuego('adivinar')" id="nav-btn-adivinar">❓ Trivial</a>
                    <a href="#" onclick="mostrarJuego('capitales')" id="nav-btn-capitales">🏛️ De 3 en 3</a>
                    <a href="#" onclick="mostrarJuego('memory')" id="nav-btn-memory">🧠 Memory</a>
                </div>
            </li>

            <li class="dropdown">
                    <a href="#" class="dropbtn" id="nav-btn-stats" onclick="mostrarEstadisticas()">📊 Estadísticas</a>
            </li>
        </ul>
        
        <button id="btn-idioma" class="btn-idioma">Español</button>
    </nav>

    <div id="vista-atlas" class="atlas-container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/41/Simple_world_map.svg/1200px-Simple_world_map.svg.png" alt="Mapa del Mundo" class="mapa-imagen">
        <div id="atlas"></div>
    </div>

    <div id="vista-juegos" class="juegos-container" style="display: none;">
        <h1 id="titulo-juego">Zona de Juegos</h1>
        <div id="contenedor-juego-activo">
            <p>Selecciona un juego del menú superior para empezar.</p>
        </div>
    </div>

    <div id="vista-estadisticas" style="display: none; padding: 20px;">
    <h2 style="text-align: center;">Estadísticas Mundiales</h2>
    
    <div class="contenedor-cabecera-estadisticas">
    <div style="width: 50px;"></div> <div class="selector-principal">
        <select id="selector-estadistica" onchange="actualizarCuadriculaEstadisticas()">
            <option value="area">🌍 Área</option>
            <option value="clima">☀️ Clima</option>
            <option value="corrupcion">⚖️ Corrupción</option>
            <option value="deportes">🏆 Deportes</option>
            <option value="desarrollo">📈 Desarrollo</option>
            <option value="economia">💰 Economía</option>
            <option value="educacion">🎓 Educación</option>
            <option value="felicidad">😊 Felicidad</option>
            <option value="gastronomia">🥘 Gastronomía</option>
            <option value="limpieza">🧼 Limpieza</option>
            <option value="longevidad">🩺 Longevidad</option>
            <option value="naturaleza">🌲 Naturaleza</option>
            <option value="poblacion">👥 Población</option>
            <option value="sanidad">🏥 Sanidad</option>
            <option value="seguridad">🛡️ Seguridad</option>
            <option value="turismo">✈️ Turismo</option>
        </select>
    </div>

    <button id="btn-orden" onclick="cambiarOrden()">🔤</button>
</div>

<div id="contenedor-paises" class="cuadricula-dinamica"></div>

<div id="contenedor-paises" class="cuadricula-paises"></div>
    
    <div style="width: 50px;"></div>
</div>

    <div id="contenedor-grid-estadisticas" style="display: flex; flex-wrap: wrap; gap: 15px; justify-content: center;"></div>
</div>

    <div id="ventana-info" class="ventana-flotante">
        <img id="vf-bandera" src="" alt="Bandera">
        <h2 id="vf-nombre">Nombre</h2>
        <p id="vf-capital">Capital</p>
    </div>

    <script src="MapaMundo.js"></script>
</body>
</html>
